# Home Assistant add-on manifest — FM Radio (RTL-SDR).
# A 3rd add-on in "Jim's Home Assistant Add-ons". Uses the RTL-SDR to play a
# broadcast FM station (live MP3 stream) AND decode RDS (station name +
# now-playing) to MQTT. NOTE: one RTL tuner = one job, so rtl_433 (ISM/meters)
# must be STOPPED while this runs (an RTL-mode switch handles that in HA).
name: "FM Radio (RTL-SDR)"
version: "1.0.0"
slug: "fm_radio"
description: "Live broadcast-FM audio + RDS station name / now-playing from an RTL-SDR, streamed to Home Assistant."
url: "https://github.com/jmartz/ha-label-printer-addon/tree/main/fm_radio"
arch:
  - aarch64
  - amd64
init: false
usb: true
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "Icecast MP3 audio stream (/radio.mp3)"
options:
  frequency_mhz: 102.7
  gain: 30
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: "mqtt_sdr"
  mqtt_pass: "sdr_mqtt_2026"
  audio_bitrate: "128k"
schema:
  frequency_mhz: float
  gain: int
  mqtt_host: str
  mqtt_port: port
  mqtt_user: str
  mqtt_pass: password
  audio_bitrate: str
