# Home Assistant add-on manifest — HackRF Spectrum.
# A second add-on in "Jim's Home Assistant Add-ons" (alongside label_printer).
name: "HackRF Spectrum"
version: "1.3.0"
slug: "hackrf_spectrum"
description: "Sweeps the RF spectrum with a HackRF One and renders a live waterfall + peak/noise sensors to Home Assistant (drives the SDR Spectrum dashboard)."
url: "https://github.com/jmartz/ha-label-printer-addon/tree/main/hackrf_spectrum"
arch:
  - aarch64   # Raspberry Pi / HA Green / HA Yellow
  - amd64     # Intel NUC / generic x86
init: false
# usb:true is the whole point — it grants the container real access to open/claim
# the HackRF One. The Terminal & SSH add-on has usb:false, which is why hackrf_open
# failed there with -1000 even though the device enumerated fine.
usb: true
# Mount the HA config dir (rw) so the rendered PNG lands where the existing
# camera.spectrum_waterfall (local_file -> /config/www/sdr/spectrum.png) reads it.
map:
  - homeassistant_config:rw
options:
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: "mqtt_sdr"
  mqtt_pass: "sdr_mqtt_2026"
  www_dir: "/homeassistant/www/sdr"
  default_band: "Airband (118-137 MHz)"
  bin_width_hz: 100000
  sweeps_per_batch: 30
  sweep_interval_s: 1
  lna_gain: 32
  vga_gain: 40
  flash_firmware: false
  diagnostic: false
schema:
  mqtt_host: str
  mqtt_port: port
  mqtt_user: str
  mqtt_pass: password
  www_dir: str
  default_band: str
  bin_width_hz: int
  sweeps_per_batch: int
  sweep_interval_s: int
  lna_gain: int
  vga_gain: int
  flash_firmware: bool
  diagnostic: bool
