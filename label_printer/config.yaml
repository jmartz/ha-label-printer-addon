# Home Assistant local add-on manifest.
# Place this whole "label_printer" folder under /addons on your HA box, then
# Settings > Add-ons > Add-on Store > (three dots) > Check for updates / reload,
# and "Breast Milk Label Printer" will appear under "Local add-ons".
name: "Breast Milk Label Printer"
version: "3.1.2"
slug: "label_printer"
description: "Prints fridge labels (breast milk + leftovers) on demand AND a web-based custom-label designer (any media size, fonts, styles, special characters, QR/barcodes) to a networked Brother QL-820NWB."
url: "https://github.com/jmartz/ha-label-printer-addon/tree/main/label_printer"
arch:
  - aarch64   # Raspberry Pi / HA Green / HA Yellow
  - amd64     # Intel NUC / generic x86 mini-PC
init: false
# Ingress lets Home Assistant proxy the designer UI through its OWN web server
# (same origin + scheme as HA), so the embedded page works over https and in the
# mobile app -- no more "can't load http: iframe" mixed-content error. With
# ingress + panel_*, the add-on also appears directly in the HA sidebar.
#
# We do NOT use host_network: it's incompatible with ingress, and it isn't
# needed -- outbound connections to the printer and the discovery scan reach the
# LAN via NAT, and scan_for_printer scans the configured printer IP's /24 (not
# the default route), so it never depends on the container's own subnet.
ingress: true
ingress_port: 8099
panel_icon: mdi:label
panel_title: "Label Designer"
# Keep the direct port open too: the M5Dial and the HA rest_command POST
# straight to 192.168.10.35:8099/print, bypassing ingress.
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "HTTP print endpoint (POST /print)"
options:
  printer_ip: "192.168.10.120"
  label: "62"
schema:
  printer_ip: str
  label: str
