# Home Assistant local add-on manifest.
# Place this whole "label_printer" folder under /addons on your HA box, then
# Settings > Add-ons > Add-on Store > (three dots) > Check for updates / reload,
# and "Breast Milk Label Printer" will appear under "Local add-ons".
name: "Breast Milk Label Printer"
version: "2.2.0"
slug: "label_printer"
description: "Prints a universal fridge label (breast milk + leftovers): day strip, in/expressed time, Use-By matrix, and thaw write-in, to a networked Brother QL-820NWB on demand."
url: "https://github.com/jmartz/ha-label-printer-addon/tree/main/label_printer"
arch:
  - aarch64   # Raspberry Pi / HA Green / HA Yellow
  - amd64     # Intel NUC / generic x86 mini-PC
init: false
# Run on the host's network for direct LAN access to the printer. (Note: the
# container's default route still goes via the Supervisor bridge, so the
# discovery scan derives its subnet from the configured printer IP, not the
# default route -- see scan_for_printer in print_server.py.)
host_network: true
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "HTTP print endpoint (POST /print)"
options:
  printer_ip: "192.168.10.120"
  label: "62"
schema:
  printer_ip: str
  label: str
